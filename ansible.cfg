[defaults]
inventory = inventories/hosts.yml
vault_password_file = vault/.vault_pass.txt         
timeout = 10
stdout_callback = yaml
roles_path = ./roles

remote_user = ansible
private_key_file = /root/.ssh/id_rsa
host_key_checking = False
retry_files_enabled = False


[privilege_escalation]
become = True
become_method = sudo
